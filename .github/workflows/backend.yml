name: Backend & Architecture CI

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  architecture-lint:
    name: Validate Hexagonal Architecture Rules
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Make script executable
      run: chmod +x ./scripts/validate_layer_rules.sh

    - name: Run Layer Rules Linter
      run: ./scripts/validate_layer_rules.sh

  backend-test:
    name: Backend Checks (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    # Placeholder for future pytest integration
    - name: Verify Environment Check
      run: echo "Environment initialized successfully"
